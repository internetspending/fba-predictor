[pytest]
addopts = -ra -v --tb=short --strict-markers --disable-warnings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = strict
markers =
    m2: database & models (Milestone 2)
    m3: filters & rules (Milestone 3)
    m5: scan pipeline (Milestone 5)
    m6: public api (Milestone 6)
    m7: results & export (Milestone 7)
    m8: deployment & docs (Milestone 8)
    m10: auth & quotas (Milestone 10)
    m11: observability (Milestone 11)
    m12: docs & polish (Milestone 12)
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
