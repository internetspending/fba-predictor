name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install --upgrade pip
      - run: pip install ruff
      - name: Ruff
        run: ruff check .

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: mypy (apps/api only for now)
        run: mypy apps/api/app/main.py --config-file mypy.ini || true

  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fba_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/fba_test
      CURRENT_MILESTONE: ${{ vars.CURRENT_MILESTONE || '2' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt

      - name: Alembic migrate (optional)
        run: |
          if command -v alembic &> /dev/null; then
            alembic upgrade head || true
          fi

      - name: Resolve milestone scope
        id: scope
        uses: actions/github-script@v7
        with:
          script: |
            // Use repo variable CURRENT_MILESTONE by default
            let active = parseInt(process.env.CURRENT_MILESTONE || "2", 10);

            // Allow PR label override: "milestone:m5", etc.
            const labels = (context.payload.pull_request?.labels || []).map(l => l.name);
            const mLabel = labels.find(l => /^milestone:m\d+$/.test(l));
            if (mLabel) active = parseInt(mLabel.split(":m")[1], 10);

            const order = [2,3,4,5,6,7,8,10,11,12];
            const enabled = order.filter(n => n <= active).map(n => `m${n}`);
            const expr = enabled.length ? enabled.join(" or ") : "m2";

            core.info(`Active milestone: ${active}`);
            core.info(`Pytest expression: ${expr}`);
            core.setOutput("pytest_expr", expr);

      - name: Run tests (milestone-scoped)
        run: pytest -m "${{ steps.scope.outputs.pytest_expr }}" --maxfail=1 -q || true
        continue-on-error: true
